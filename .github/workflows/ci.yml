name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build and smoke test
    runs-on: ubuntu-latest

    timeout-minutes: 10

    steps:
    - uses: actions/checkout@v6

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore local .NET tools
      run: dotnet tool restore

    - name: Run smoke test
      run: ./tests/smoke.sh
